<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1440" />
<title>aift Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
  :root {
    --bg: #FAFAFA;
    --card: #FFFFFF;
    --border: #ECECEC;
    --border-strong: #E0E0E0;
    --ink-900: #1A1A1A;
    --ink-700: #3D3D3D;
    --ink-500: #6B6B6B;
    --ink-400: #9A9A9A;
    --ink-300: #C4C4C4;
    --ink-200: #E5E5E5;
    --accent: #F5A623;
    --accent-soft: #FFF4E0;
    --accent-soft-2: #FFE9C2;
    --accent-ink: #8A5A0F;
    --blue: #3B82F6;
    --blue-soft: #E8F0FE;
    --green: #10B981;
    --green-soft: #D1FAE5;
    --red: #EF4444;
    --red-soft: #FEE2E2;
    --purple: #8B5CF6;
    --purple-soft: #EDE9FE;
    --shadow-card: 0 1px 2px rgba(15,15,15,.04), 0 0 0 1px var(--border);
    --shadow-pop: 0 12px 32px rgba(20,20,20,.08), 0 2px 6px rgba(20,20,20,.04), 0 0 0 1px var(--border);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--ink-900);
    font-feature-settings: "ss02", "tnum";
    -webkit-font-smoothing: antialiased;
  }
  body { min-width: 1440px; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #D9D9D9; border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #BDBDBD; }
  ::-webkit-scrollbar-track { background: transparent; }
  .nowrap { white-space: nowrap; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .section-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; color: var(--ink-400);
    margin-bottom: 12px;
  }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!--
  로드 순서 중요:
  1. common.jsx    — Icon, 헬퍼, Sidebar, Header (모든 탭 공유)
  2. data.jsx      — window.AppData (회의실 데이터)
  3. leave-data.jsx — window.LeaveData (연차 데이터)
  4. 회의실 탭 컴포넌트들
  5. leave.jsx     — 연차 탭 (LeaveTab, LeaveModal → window에 등록)
  6. dashboard.jsx — 대시보드 탭
  7. app.jsx       — 루트 App + ReactDOM.render (마지막)
-->
<script type="text/babel" src="src/common.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/leave-data.jsx"></script>
<script type="text/babel" src="src/sidepanel.jsx"></script>
<script type="text/babel" src="src/timetable.jsx"></script>
<script type="text/babel" src="src/monthly.jsx"></script>
<script type="text/babel" src="src/modals.jsx"></script>
<script type="text/babel" src="src/leave.jsx"></script>
<script type="text/babel" src="src/dashboard.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
